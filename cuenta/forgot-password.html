<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | LUXE</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#c9a03d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LUXE">
    <link rel="apple-touch-icon" href="../img/icons/icon-192x192.png">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Recupera tu contraseña de LUXE Store.">
    <meta name="robots" content="noindex, follow">

    <!-- Registrar Service Worker -->
    <script src="../js/pwa.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">LUXE</span>
                </div>
                <h2>Recuperar Contraseña</h2>
                <p>Te enviaremos un enlace para restablecer tu contraseña</p>
            </div>
            
            <form class="auth-form" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <button type="submit" class="auth-btn">Enviar Instrucciones</button>
            </form>
            
            <div class="auth-footer">
                <p><a href="login.html">← Volver al inicio de sesión</a></p>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/localStorage.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showNotification('✅ Se ha enviado un enlace a tu correo', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showNotification(data.message || 'Error al enviar el correo', 'error');
                }
            } catch (error) {
                showNotification('Error de conexión', 'error');
            }
        });
        
        function showNotification(message, type) {
            if (typeof window.showNotification === 'function') {
                window.showNotification(message, type);
            } else {
                alert(message);
            }
        }
    </script>
</body>
</html>
