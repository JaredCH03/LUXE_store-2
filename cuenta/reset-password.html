<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | LUXE</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#c9a03d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LUXE">
    <link rel="apple-touch-icon" href="../img/icons/icon-192x192.png">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Restablece tu contraseña de LUXE Store.">
    <meta name="robots" content="noindex, follow">

    <!-- Registrar Service Worker -->
    <script src="../js/pwa.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">LUXE</span>
                </div>
                <h2>Nueva Contraseña</h2>
                <p>Ingresa tu nueva contraseña</p>
            </div>
            
            <form class="auth-form" id="resetPasswordForm">
                <div class="form-group">
                    <label for="password">Nueva contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repite tu contraseña" required>
                </div>
                
                <button type="submit" class="auth-btn">Restablecer Contraseña</button>
            </form>
            
            <div class="auth-footer">
                <p><a href="login.html">← Volver al inicio de sesión</a></p>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        if (!token) {
            alert('Token inválido o expirado');
            window.location.href = 'login.html';
        }
        
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Las contraseñas no coinciden');
                return;
            }
            
            if (password.length < 6) {
                alert('La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Contraseña actualizada correctamente');
                    window.location.href = 'login.html';
                } else {
                    alert(data.message || 'Error al actualizar');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });
    </script>
</body>
</html>
