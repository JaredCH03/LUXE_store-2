<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | LUXE</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#c9a03d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LUXE">
    <link rel="apple-touch-icon" href="../img/icons/icon-192x192.png">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Inicia sesión en LUXE Store para acceder a productos exclusivos.">
    <meta name="robots" content="noindex, follow">

    <!-- Registrar Service Worker -->
    <script src="../js/pwa.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">LUXE</span>
                </div>
                <h2>Bienvenido de vuelta</h2>
                <p>Inicia sesión para continuar</p>
            </div>
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <button type="submit" class="auth-btn">Iniciar Sesión</button>
            </form>
            
            <div class="auth-footer">
                <p><a href="forgot-password.html" style="display: block; margin-bottom: 10px;">¿Olvidaste tu contraseña?</a></p>
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
    
    <script src="../js/config.js"></script>
    <script src="../js/localStorage.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            login(email, password);
        });
    </script>
</body>
</html>
