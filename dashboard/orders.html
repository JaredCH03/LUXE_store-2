<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos | Panel Vendedor</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo logo-left">
                <span class="logo-icon">✦</span>
                <span class="logo-text">LUXE Vendedor</span>
            </div>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <div class="nav-icons">
                <div class="user-menu">
                    <button class="user-btn" id="userMenuBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span class="user-name" id="userNameDisplay"></span>
                    </button>
                    <div class="user-dropdown" id="userDropdown">
                         <a href="perfil.html"> Mi Perfil</a>
                        <a href="#" id="logoutBtn">Cerrar Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="store-name" id="storeName">Mi Tienda</div>
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="index.html">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H9v8H5a2 2 0 0 1-2-2z"/>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="products.html">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 7h-4.18A3 3 0 0 0 16 5.18V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v1.18A3 3 0 0 0 8.18 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                            <path d="M8 7h8"/>
                            <circle cx="12" cy="13" r="2"/>
                        </svg>
                        <span>Productos</span>
                    </a>
                </li>
                <li>
                    <a href="orders.html" class="active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <path d="M16 10a4 4 0 0 1-8 0"/>
                        </svg>
                        <span>Pedidos</span>
                    </a>
                </li>
                <li>
                    <a href="sales.html">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                            <circle cx="12" cy="12" r="4"/>
                        </svg>
                        <span>Ventas</span>
                    </a>
                </li>
            </ul>
        </aside>

        <main class="dashboard-main">
            <h1>Pedidos Recibidos</h1>
            <table class="data-table">
                <thead>
                    <tr><th>ID Pedido</th><th>Fecha</th><th>Cliente</th><th>Productos</th><th>Total</th><th>Estado</th></tr>
                </thead>
                <tbody id="ordersList"></tbody>
            </table>
        </main>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/localStorage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
